# Deploy em producao no VPS. Conecta o serviço `web` à rede externa
# `proxy_network` para receber tráfego via nginx-proxy + acme-companion
# (que cuidam de HTTPS automático com Let's Encrypt).
#
# Uso no VPS:
#   cp .env.production.example .env.production
#   # editar .env.production com valores reais
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

services:
  web:
    build:
      context: .
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    image: cnpj-web:latest
    container_name: cnpj_web
    restart: unless-stopped
    environment:
      VIRTUAL_HOST: ${WEB_DOMAIN}
      VIRTUAL_PORT: "80"
      LETSENCRYPT_HOST: ${WEB_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    networks:
      - proxy_network

networks:
  proxy_network:
    external: true
